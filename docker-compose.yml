services:
  app-1:
    build: .
    ports:
      - "8080:8080"
    environment:
      GOQUEUE_POSTGRES_URL: "postgresql://goqueue:goqueue@postgres:5432/goqueue?sslmode=disable"
      GOQUEUE_REDIS_URL: "redis:6379"
      GOQUEUE_API_KEY: "change-me-in-production"
      GOQUEUE_INSTANCE_ID: "instance-1"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app-2:
    build: .
    ports:
      - "8081:8080"
    environment:
      GOQUEUE_POSTGRES_URL: "postgresql://goqueue:goqueue@postgres:5432/goqueue?sslmode=disable"
      GOQUEUE_REDIS_URL: "redis:6379"
      GOQUEUE_API_KEY: "change-me-in-production"
      GOQUEUE_INSTANCE_ID: "instance-2"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goqueue
      POSTGRES_PASSWORD: goqueue
      POSTGRES_DB: goqueue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.53.5
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app-1

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
