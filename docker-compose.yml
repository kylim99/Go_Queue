services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      GOQUEUE_POSTGRES_URL: "postgresql://goqueue:goqueue@postgres:5432/goqueue?sslmode=disable"
      GOQUEUE_REDIS_URL: "redis:6379"
      GOQUEUE_API_KEY: "change-me-in-production"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goqueue
      POSTGRES_PASSWORD: goqueue
      POSTGRES_DB: goqueue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
